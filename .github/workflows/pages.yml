# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
#      - name: Build with Jekyll
#        # Outputs to the './_site' directory by default
#        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
#        env:
#          JEKYLL_ENV: production
#      - name: Build /en with Jekyll
#        # Outputs to the './_site' directory by default
#        run: cd ./en && bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
#        env:
#          JEKYLL_ENV: production
#      - name: Build /cy with Jekyll
#        # Outputs to the './_site' directory by default
#        run: cd ./cy && bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
#        env:
#          JEKYLL_ENV: production
      - name: Jekyll build
        run: |
          #git branch
          #dst=$(pwd)/${{ inputs.destination }}
          #echo "*** ${dst} ***"
          # tree .
          #cd ${{ inputs.source }}
          # pwd
          #python prepare.py ${{ inputs.baseurl }} # insert headers, change md relative link path to html ...
          bundle exec jekyll build \
            --config ./en/_config.yml \
            --source ./en/ \
            --destination $dst/en/ \
            --baseurl ${{ inputs.baseurl }}en/
          bundle exec jekyll build \
            --config ./cy/_config.yml \
            --source ./cy/ \
            --destination $dst/cy/ \
            --baseurl ${{ inputs.baseurl }}cy/
         # cp -s $dst/cy/index.html $dst/
         #bundle exec jekyll build \
         #  --config ./en/_config.yml
         #  --source ./en/
         #bundle exec jekyll build \
         #  --config ./cy/_config.yml
         #  --source ./cy/
          # tree $dst
          #cd -
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v5

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
